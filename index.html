<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SİSTEM</title>

<style>
body{
  background:black;
  color:#00ff00;
  font-family:monospace;
  text-align:center;
  overflow:hidden;
}

input,button{
  margin:10px;
  padding:10px;
  background:black;
  color:#00ff00;
  border:1px solid #00ff00;
}

#img{
  display:none;
  width:100%;
  height:100vh;
  object-fit:cover;
}

.hack{
  color:red;
  font-size:30px;
  animation:blink 0.2s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0;}
  100%{opacity:1;}
}
</style>
</head>

<body>

<div id="game">
<h2>LEVEL 1</h2>
<p>17 + 28 = ?</p>
<input id="a">
<br>
<button onclick="check1()">ENTER</button>
</div>

<img id="img" src="https://i.imgur.com/8wKQZ5k.jpg">
<audio id="sound" src="https://www.myinstants.com/media/sounds/movie_1.mp3"></audio>

<script>

function scare(){
  let img = document.getElementById("img");
  let sound = document.getElementById("sound");

  img.style.display="block";
  sound.play();
}

// LEVEL 1
function check1(){
  let val = document.getElementById("a").value;
  if(val == "45"){
    level2();
  }else{
    hackScreen();
  }
}

// LEVEL 2
function level2(){
  document.getElementById("game").innerHTML = `
  <h2>LEVEL 2</h2>
  <p>144 ÷ 12 = ?</p>
  <input id="b">
  <br>
  <button onclick="check2()">ENTER</button>
  `;
}

function check2(){
  let val = document.getElementById("b").value;
  if(val == "12"){
    level3();
  }else{
    hackScreen();
  }
}

// LEVEL 3 (zor mantık)
function level3(){
  document.getElementById("game").innerHTML = `
  <h2>LEVEL 3</h2>
  <p>2, 6, 7, 21, 22, ?</p>
  <input id="c">
  <br>
  <button onclick="check3()">ENTER</button>
  `;
}

function check3(){
  let val = document.getElementById("c").value;
  if(val == "66"){
    captcha();
  }else{
    hackScreen();
  }
}

// ROBOT TESTİ (zorlaştırılmış)
function captcha(){
  document.getElementById("game").innerHTML = `
  <h2>SON TEST</h2>
  <p>Robot değilsen çöz:</p>
  <p><b>(9 × 7) + 13 = ?</b></p>
  <input id="d">
  <br>
  <button onclick="finish()">DOĞRULA</button>
  `;
}

function finish(){
  let val = document.getElementById("d").value;

  if(val == "76"){
    document.getElementById("game").innerHTML="<h1>KAÇTIN 😎</h1>";
  }else{
    hackScreen();
  }
}

// HACK EKRANI 😈
function hackScreen(){
  document.body.innerHTML = `
  <h1 class="hack">SİSTEM HACKLENDİ</h1>
  <p>Verilerin yükleniyor...</p>
  `;

  let sound = document.getElementById("sound");
  if(sound) sound.play();

  setTimeout(()=>{
    scare();
  },1500);
}

</script>

</body>
</html>

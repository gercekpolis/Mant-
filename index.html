<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sistem</title>

<style>
body{
  background:black;
  color:#00ff00;
  font-family:monospace;
  text-align:center;
}

input,button{
  margin:10px;
  padding:10px;
  background:black;
  color:#00ff00;
  border:1px solid #00ff00;
}

#img{
  display:none;
  width:100%;
  height:100vh;
  object-fit:cover;
}
</style>
</head>

<body>

<div id="game">
<h2>LEVEL 1</h2>
<p>5 + 7 = ?</p>
<input id="a">
<br>
<button onclick="check1()">ENTER</button>
</div>

<img id="img" src="https://i.imgur.com/8wKQZ5k.jpg">
<audio id="sound" src="https://www.myinstants.com/media/sounds/movie_1.mp3"></audio>

<script>

function scare(){
  let img = document.getElementById("img");
  let sound = document.getElementById("sound");

  img.style.display="block";
  sound.play();
}

// LEVEL 1
function check1(){
  let val = document.getElementById("a").value;
  if(val == "12"){
    level2();
  }else{
    scare();
  }
}

// LEVEL 2
function level2(){
  document.getElementById("game").innerHTML = `
  <h2>LEVEL 2</h2>
  <p>10 × 6 = ?</p>
  <input id="b">
  <br>
  <button onclick="check2()">ENTER</button>
  `;
}

function check2(){
  let val = document.getElementById("b").value;
  if(val == "60"){
    level3();
  }else{
    scare();
  }
}

// LEVEL 3 (mantık)
function level3(){
  document.getElementById("game").innerHTML = `
  <h2>LEVEL 3</h2>
  <p>3, 6, 12, 24, ?</p>
  <input id="c">
  <br>
  <button onclick="check3()">ENTER</button>
  `;
}

function check3(){
  let val = document.getElementById("c").value;
  if(val == "48"){
    captcha();
  }else{
    scare();
  }
}

// ROBOT TESTİ 😈
function captcha(){
  document.getElementById("game").innerHTML = `
  <h2>SON TEST</h2>
  <p>Ben robot değilim kanıtla</p>
  <p><b>Bu sayıyı yaz: 7392</b></p>
  <input id="d">
  <br>
  <button onclick="finish()">DOĞRULA</button>
  `;
}

function finish(){
  let val = document.getElementById("d").value;

  if(val == "7392"){
    document.getElementById("game").innerHTML="<h1>KAÇTIN 😎</h1>";
  }else{
    scare();
  }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sistem</title>

<style>
body{
  background:black;
  color:#00ff00;
  font-family:monospace;
  text-align:center;
  overflow:hidden;
}

button,input{
  margin:10px;
  padding:10px;
  background:black;
  color:#00ff00;
  border:1px solid #00ff00;
}

#terminal{
  text-align:left;
  padding:20px;
  height:100vh;
}

.glitch{
  font-size:40px;
  animation: glitch 0.2s infinite;
}

@keyframes glitch{
  0%{text-shadow:2px 2px red;}
  50%{text-shadow:-2px -2px blue;}
  100%{text-shadow:2px -2px green;}
}
</style>
</head>

<body>

<div id="terminal"></div>

<audio id="wrongSound" src="kabe-hacilar-hu-der-allah-abdurrahman-onul-celal-karature.mp3"></audio>
<audio id="loseSound" src="recep-tayyip-erdogan-ak-parti-secim-muzigi-2014-ugur-isilak-dombra.mp3" loop></audio>

<script>

// HACKER BAŞLANGIÇ
let lines = [
  "Initializing system...",
  "Bypassing firewall...",
  "Security disabled...",
  "Decrypting files...",
  "Access granted ✔"
];

let i = 0;

function type(){
  if(i < lines.length){
    document.getElementById("terminal").innerHTML += lines[i] + "<br>";
    i++;
    setTimeout(type, 500);
  }else{
    setTimeout(startMenu, 1000);
  }
}
type();

// MENÜ
function startMenu(){
  document.body.innerHTML = `
  <div id="game">
    <h1 class="glitch">SYSTEM READY</h1>
    <button onclick="startDots()">START</button>
  </div>
  `;
}

// DOT OYUNU
let pos = 0;
let dir = 1;
let move;

function startDots(){
  document.getElementById("game").innerHTML = `
  <h2>Align the dots</h2>
  <p>Press STOP when they match</p>
  <div style="position:relative;height:200px;">
    <div id="target" style="position:absolute;left:50%;top:50%;">.</div>
    <div id="dot" style="position:absolute;left:0%;top:50%;">.</div>
  </div>
  <button onclick="checkDot()">STOP</button>
  `;

  move = setInterval(()=>{
    pos += dir * 2;
    if(pos > 90 || pos < 0) dir *= -1;
    document.getElementById("dot").style.left = pos + "%";
  },30);
}

function checkDot(){
  clearInterval(move);

  let d = document.getElementById("dot").getBoundingClientRect();
  let t = document.getElementById("target").getBoundingClientRect();

  if(Math.abs(d.left - t.left) < 20){
    startGame();
  }else{
    hackNow();
  }
}

// ZOR PUZZLE
let questions = [
  {q:"2, 6, 7, 21, 22, ?", a:"66"},
  {q:"5 makine 5 dakikada 5 ürün → 100 makine 100 dakikada?", a:"100"},
  {q:"Saat 3:15 açı?", a:"7.5"},
  {q:"1 kg pamuk mu ağır 1 kg demir mi?", a:"eşit"},
  {q:"8 + 8 = 4 ise 6 + 6 = ?", a:"3"},
  {q:"Bir baba 40, oğlu 10 → kaç yıl sonra 2 kat?", a:"20"}
];

questions = questions.sort(() => Math.random() - 0.5);

let current = 0;

// OYUN
function startGame(){
  document.body.innerHTML = `
  <div id="play"></div>
  `;
  showQuestion();
}

function showQuestion(){
  if(current >= questions.length){
    win();
    return;
  }

  document.getElementById("play").innerHTML = `
    <h2>LEVEL ${current+1}</h2>
    <p>${questions[current].q}</p>
    <input id="answer">
    <br>
    <button onclick="check()">ENTER</button>
  `;
}

function check(){
  let v = document.getElementById("answer").value.toLowerCase().trim();

  if(v.includes(questions[current].a)){
    current++;
    showQuestion();
  }else{
    hackNow();
  }
}

// KAZAN
function win(){
  document.getElementById("play").innerHTML = `
  <h1 class="glitch">YOU WIN 🎉</h1>
  `;
}

// HACK ANINDA
function hackNow(){

  let s = document.getElementById("wrongSound");
  s.play();

  setTimeout(()=>{
    document.body.innerHTML = `
    <h1 class="glitch">YOU HAVE BEEN HACKED</h1>
    <p>All data is being stolen...</p>
    `;

    let recep = document.getElementById("loseSound");
    recep.play();

  },500);
}

</script>

</body>
</html>

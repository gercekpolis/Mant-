<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Bulmaca Oyunu PRO</title>

<style>
body{
  background:#0a0a0a;
  color:#00ffcc;
  font-family:monospace;
  text-align:center;
}

#hud{
  margin:10px;
  font-size:18px;
}

input,button{
  margin:10px;
  padding:10px;
  background:#111;
  color:#00ffcc;
  border:1px solid #00ffcc;
  border-radius:5px;
}

button:hover{
  background:#00ffcc;
  color:black;
}
</style>
</head>

<body>

<div id="hud">
❤️ Can: <span id="life">3</span> |
🏆 Puan: <span id="score">0</span> |
⏱️ Süre: <span id="time">10</span>
</div>

<div id="game"></div>

<audio id="wrongSound" src="kabe-hacilar-hu-der-allah-abdurrahman-onul-celal-karature.mp3"></audio>

<script>

let life = 3;
let score = 0;
let timer;
let timeLeft = 10;

// SORULAR
let questions = [
  {q:"12 + 8", a:"20"},
  {q:"9 × 3", a:"27"},
  {q:"45 - 17", a:"28"},
  {q:"2,4,6,8, ?", a:"10"},
  {q:"5 × 5", a:"25"},
  {q:"30 ÷ 5", a:"6"}
];

let current = 0;

// OYUN BAŞLAT
function start(){
  showQuestion();
}

// SORU GÖSTER
function showQuestion(){
  if(current >= questions.length){
    win();
    return;
  }

  timeLeft = 10;
  updateHUD();

  document.getElementById("game").innerHTML = `
    <h2>LEVEL ${current+1}</h2>
    <p>${questions[current].q} = ?</p>
    <input id="answer">
    <br>
    <button onclick="check()">ENTER</button>
  `;

  startTimer();
}

// KONTROL
function check(){
  let val = document.getElementById("answer").value;

  if(val == questions[current].a){
    score += 10;
    current++;
    showQuestion();
  }else{
    wrong();
  }

  updateHUD();
}

// YANLIŞ
function wrong(){
  life--;
  let s = document.getElementById("wrongSound");
  s.currentTime = 0;
  s.play();

  if(life <= 0){
    gameOver();
  }

  updateHUD();
}

// TIMER
function startTimer(){
  clearInterval(timer);

  timer = setInterval(()=>{
    timeLeft--;
    updateHUD();

    if(timeLeft <= 0){
      wrong();
      clearInterval(timer);
      showQuestion();
    }
  },1000);
}

// HUD GÜNCELLE
function updateHUD(){
  document.getElementById("life").innerText = life;
  document.getElementById("score").innerText = score;
  document.getElementById("time").innerText = timeLeft;
}

// KAZANDIN
function win(){
  document.getElementById("game").innerHTML = `
  <h1>TEBRİKLER 🎉</h1>
  <p>Puanın: ${score}</p>
  `;
}

// GAME OVER
function gameOver(){
  document.getElementById("game").innerHTML = `
  <h1>OYUN BİTTİ 💀</h1>
  <p>Puanın: ${score}</p>
  `;
}

// BAŞLAT
start();

</script>

</body>
</html>

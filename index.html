<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Bulmaca Oyunu</title>

<style>
body{
  background:#111;
  color:#00ff00;
  font-family:monospace;
  text-align:center;
}

input,button{
  margin:10px;
  padding:10px;
  background:#222;
  color:#00ff00;
  border:1px solid #00ff00;
}
</style>
</head>

<body>

<div id="game">
<h2>LEVEL 1</h2>
<p>12 + 8 = ?</p>
<input id="a">
<br>
<button onclick="check1()">ENTER</button>
</div>

<!-- SES -->
<audio id="wrongSound" src="kabe-hacilar-hu-der-allah-abdurrahman-onul-celal-karature.mp3"></audio>

<script>

function wrong(){
  let s = document.getElementById(kabe-hacilar-hu-der-allah-abdurrahman-onul-celal-karature.mp3);
  s.currentTime = 0;
  s.play();
}

// LEVEL 1
function check1(){
  let v = document.getElementById("a").value;
  if(v == "20"){
    level2();
  }else{
    wrong();
  }
}

// LEVEL 2
function level2(){
  document.getElementById("game").innerHTML = `
  <h2>LEVEL 2</h2>
  <p>9 × 3 = ?</p>
  <input id="b">
  <br>
  <button onclick="check2()">ENTER</button>
  `;
}

function check2(){
  let v = document.getElementById("b").value;
  if(v == "27"){
    level3();
  }else{
    wrong();
  }
}

// LEVEL 3
function level3(){
  document.getElementById("game").innerHTML = `
  <h2>LEVEL 3</h2>
  <p>45 - 17 = ?</p>
  <input id="c">
  <br>
  <button onclick="check3()">ENTER</button>
  `;
}

function check3(){
  let v = document.getElementById("c").value;
  if(v == "28"){
    level4();
  }else{
    wrong();
  }
}

// LEVEL 4
function level4(){
  document.getElementById("game").innerHTML = `
  <h2>LEVEL 4</h2>
  <p>2, 4, 6, 8, ?</p>
  <input id="d">
  <br>
  <button onclick="check4()">ENTER</button>
  `;
}

function check4(){
  let v = document.getElementById("d").value;
  if(v == "10"){
    finalTest();
  }else{
    wrong();
  }
}

// FINAL
function finalTest(){
  document.getElementById("game").innerHTML = `
  <h2>SON</h2>
  <p>Robot değilsen yaz:</p>
  <p><b>ELMA</b></p>
  <input id="e">
  <br>
  <button onclick="finish()">DOĞRULA</button>
  `;
}

function finish(){
  let v = document.getElementById("e").value.toUpperCase();

  if(v == "ELMA"){
    document.getElementById("game").innerHTML="<h1>TEBRİKLER 🎉</h1>";
  }else{
    wrong();
  }
}

</script>

</body>
</html>
